syntax = "proto3";

package analysis;

message NetworkEvent {
  int64 timestamp = 1;
  string source_ip = 2;
  string method = 3;
  string url = 4;
  bytes raw_body = 5;
}

message AnalysisResponse {
  string session_id = 1;
  bool status = 2;
}

service AnalysisService {
  rpc PushEvent (NetworkEvent) returns (AnalysisResponse);
}